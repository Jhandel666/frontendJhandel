<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorías</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      min-height: 100vh;
      padding: 30px;
      color: #1f2937;
    }

    .contenedor {
      max-width: 950px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
    }

    .cabecera {
      background: #111827;
      color: white;
      padding: 28px;
    }

    .cabecera h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .cabecera p {
      color: #cbd5e1;
      font-size: 15px;
    }

    .contenido {
      padding: 28px;
    }

    .panel-formulario {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .panel-formulario h2 {
      font-size: 20px;
      margin-bottom: 16px;
      color: #0f172a;
    }

    .fila-formulario {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
    }

    .campo-texto {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
    }

    .campo-texto:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-crear {
      background: #2563eb;
      color: white;
    }

    .btn-actualizar {
      background: #f59e0b;
      color: white;
      display: none;
    }

    .btn-cancelar {
      background: #64748b;
      color: white;
      display: none;
    }

    .barra-superior {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-recargar {
      background: #16a34a;
      color: white;
    }

    .estado {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      display: none;
    }

    .tabla-contenedor {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    thead {
      background: #e2e8f0;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      color: #0f172a;
      font-size: 14px;
    }

    td {
      font-size: 15px;
    }

    .acciones {
      display: flex;
      gap: 8px;
    }

    .btn-editar {
      background: #facc15;
      color: #111827;
      padding: 8px 12px;
    }

    .btn-eliminar {
      background: #ef4444;
      color: white;
      padding: 8px 12px;
    }

    .sin-datos {
      text-align: center;
      padding: 24px;
      color: #64748b;
    }

    @media (max-width: 768px) {
      .fila-formulario {
        grid-template-columns: 1fr;
      }

      .acciones {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <h1>Sistema de Categorías</h1>
      <p>Administración de categorías</p>
    </div>

    <div class="contenido">
      <div class="panel-formulario">
        <h2 id="tituloFormulario">Registrar categoría</h2>

        <input type="hidden" id="id_categoria" />

        <div class="fila-formulario">
          <input
            id="descripcion"
            class="campo-texto"
            type="text"
            placeholder="Escribe la descripción de la categoría"
          />
          <button class="btn-crear" id="btnCrear" onclick="crearCategoria()">Guardar</button>
          <button class="btn-actualizar" id="btnActualizar" onclick="actualizarCategoria()">Actualizar</button>
          <button class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicion()">Cancelar</button>
        </div>
      </div>

      <div class="barra-superior">
        <h2>Listado de categorías</h2>
        <button class="btn-recargar" onclick="obtenerCategorias()">Recargar datos</button>
      </div>

      <div class="estado" id="mensajeEstado"></div>

      <div class="tabla-contenedor">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Descripción</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCategorias">
            <tr>
              <td colspan="3" class="sin-datos">No hay categorías registradas</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API = "https://backendjs-gvd1.onrender.com/categorias";

    const txtDescripcion = document.getElementById("descripcion");
    const txtId = document.getElementById("id_categoria");
    const cuerpoTabla = document.getElementById("tablaCategorias");
    const mensajeEstado = document.getElementById("mensajeEstado");
    const btnCrear = document.getElementById("btnCrear");
    const btnActualizar = document.getElementById("btnActualizar");
    const btnCancelar = document.getElementById("btnCancelar");
    const tituloFormulario = document.getElementById("tituloFormulario");

    async function obtenerCategorias() {
      try {
        mostrarMensaje("Consultando categorías...", true);

        const respuesta = await fetch(API);
        const resultado = await respuesta.json();

        const categorias = resultado.datos || [];

        cuerpoTabla.innerHTML = "";

        if (categorias.length === 0) {
          cuerpoTabla.innerHTML = `
            <tr>
              <td colspan="3" class="sin-datos">No hay categorías registradas</td>
            </tr>
          `;
          mostrarMensaje("No se encontraron registros");
          return;
        }

        categorias.forEach((categoria) => {
          cuerpoTabla.innerHTML += `
            <tr>
              <td>${categoria.id_categoria}</td>
              <td>${categoria.descripcion}</td>
              <td>
                <div class="acciones">
                  <button class="btn-editar" onclick="cargarEdicion(${categoria.id_categoria}, '${categoria.descripcion.replace(/'/g, "\\'")}')">Editar</button>
                  <button class="btn-eliminar" onclick="eliminarCategoria(${categoria.id_categoria})">Eliminar</button>
                </div>
              </td>
            </tr>
          `;
        });

        mostrarMensaje("Categorías cargadas correctamente");
      } catch (error) {
        mostrarMensaje("No se pudieron cargar las categorías", false, true);
        console.error(error);
      }
    }

    async function crearCategoria() {
      try {
        const descripcion = txtDescripcion.value.trim();

        if (!descripcion) {
          mostrarMensaje("Debes ingresar una descripción", false, true);
          return;
        }

        const respuesta = await fetch(API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ descripcion })
        });

        const resultado = await respuesta.json();

        if (!respuesta.ok) {
          mostrarMensaje(resultado.mensaje || "No se pudo registrar", false, true);
          return;
        }

        txtDescripcion.value = "";
        mostrarMensaje("Categoría registrada correctamente");
        obtenerCategorias();
      } catch (error) {
        mostrarMensaje("Error al registrar la categoría", false, true);
        console.error(error);
      }
    }

    function cargarEdicion(id, descripcion) {
      txtId.value = id;
      txtDescripcion.value = descripcion;

      tituloFormulario.textContent = "Editar categoría";
      btnCrear.style.display = "none";
      btnActualizar.style.display = "inline-block";
      btnCancelar.style.display = "inline-block";
    }

    async function actualizarCategoria() {
      try {
        const id = txtId.value;
        const descripcion = txtDescripcion.value.trim();

        if (!id) {
          mostrarMensaje("No hay categoría seleccionada", false, true);
          return;
        }

        if (!descripcion) {
          mostrarMensaje("La descripción no puede quedar vacía", false, true);
          return;
        }

        const respuesta = await fetch(`${API}/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ descripcion })
        });

        const resultado = await respuesta.json();

        if (!respuesta.ok) {
          mostrarMensaje(resultado.mensaje || "No se pudo actualizar", false, true);
          return;
        }

        cancelarEdicion();
        mostrarMensaje("Categoría actualizada correctamente");
        obtenerCategorias();
      } catch (error) {
        mostrarMensaje("Error al actualizar la categoría", false, true);
        console.error(error);
      }
    }

    async function eliminarCategoria(id) {
      try {
        const confirmar = confirm("¿Seguro que deseas eliminar esta categoría?");
        if (!confirmar) return;

        const respuesta = await fetch(`${API}/${id}`, {
          method: "DELETE"
        });

        const resultado = await respuesta.json();

        if (!respuesta.ok) {
          mostrarMensaje(resultado.mensaje || "No se pudo eliminar", false, true);
          return;
        }

        mostrarMensaje("Categoría eliminada correctamente");
        obtenerCategorias();
      } catch (error) {
        mostrarMensaje("Error al eliminar la categoría", false, true);
        console.error(error);
      }
    }

    function cancelarEdicion() {
      txtId.value = "";
      txtDescripcion.value = "";
      tituloFormulario.textContent = "Registrar categoría";

      btnCrear.style.display = "inline-block";
      btnActualizar.style.display = "none";
      btnCancelar.style.display = "none";
    }

    function mostrarMensaje(texto, visible = true, esError = false) {
      mensajeEstado.style.display = visible ? "block" : "none";
      mensajeEstado.textContent = texto;

      if (esError) {
        mensajeEstado.style.background = "#fef2f2";
        mensajeEstado.style.border = "1px solid #fecaca";
        mensajeEstado.style.color = "#b91c1c";
      } else {
        mensajeEstado.style.background = "#eff6ff";
        mensajeEstado.style.border = "1px solid #bfdbfe";
        mensajeEstado.style.color = "#1d4ed8";
      }
    }

    obtenerCategorias();
  </script>
</body>
</html>
